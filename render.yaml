services:
  - type: web
    name: linkly
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: linkly-db
          property: connectionString
      - key: BASE_URL
        sync: false   

databases:
  - name: linkly-db
    databaseName: linkly
    user: linkly
    plan: free
