<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Link Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .code { font-size: 80px; font-weight: 800; color: #7c6af7; line-height: 1; }
    h1 { font-size: 22px; margin: 12px 0 8px; }
    p { color: #7a7a9a; font-size: 14px; margin-bottom: 24px; }
    a {
      background: #7c6af7;
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    a:hover { background: #9585ff; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Link not found</h1>
    <p>This short link doesn't exist or has been deleted.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
